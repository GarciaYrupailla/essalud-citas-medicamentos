name: CI - Code Validation

on:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias Frontend
        working-directory: frontend
        run: npm install

      - name: Generar Build
        working-directory: frontend
        run: npm run build