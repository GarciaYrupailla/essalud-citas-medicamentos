name: CI - Security Audit

on:
  push:
    branches:
      - main

jobs:
  security:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        project:
          - backend
          - frontend

    defaults:
      run:
        working-directory: ${{ matrix.project }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        run: npm install

      - name: Auditoría de seguridad
        run: npm audit || true